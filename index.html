<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>曹家麻将计帐板</title>
  <link rel="icon" href="icon.png" type="image/png">
  <style>
    :root {
      --bg: #e8f0ea;
      --card: rgba(246, 252, 248, 0.9);
      --line: #b8cbbd;
      --text: #1f2f24;
      --muted: #5f7566;
      --gain: #1f7a4e;
      --loss: #8e3a2f;
      --accent: #3f8f5f;
      --shadow: 0 14px 28px rgba(12, 45, 24, 0.18);
      --ground-image: url("windows_background.png");
      --ground-overlay: rgba(16, 42, 27, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background-image:
        linear-gradient(var(--ground-overlay), var(--ground-overlay)),
        var(--ground-image);
      background-size: cover, cover;
      background-position: center, center;
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
      min-height: 100vh;
      padding: 18px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      background: rgba(244, 251, 246, 0.88);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    .top {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .namebar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .stepbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .namebox {
      display: grid;
      gap: 6px;
    }

    .namebox label {
      font-size: 12px;
      color: var(--muted);
    }

    .namebox input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      outline: none;
    }

    .namebox input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63, 143, 95, 0.18);
    }

    .stepbox {
      display: grid;
      gap: 6px;
      max-width: 220px;
    }

    .stepbox label {
      font-size: 12px;
      color: var(--muted);
    }

    .stepbox input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      outline: none;
    }

    .stepbox input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63, 143, 95, 0.18);
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .stat small { color: var(--muted); }

    .value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .board {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .panel h2 {
      margin: 0;
      font-size: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      border-radius: 0;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      padding: 10px 6px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(18, 57, 33, 0.14);
      border-color: #7ea98b;
    }

    button:active {
      transform: translateY(0);
    }

    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(63, 143, 95, 0.24);
    }

    .loss {
      color: var(--loss);
      background: #fff2f0;
      border-color: #ddb6b0;
    }

    .gain {
      color: var(--gain);
      background: #f0fbf3;
      border-color: #a9cfb6;
    }

    .panel-foot {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }

    .actions {
      padding: 0 14px 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .main-btn {
      border-radius: 0;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    }

    .primary {
      background: linear-gradient(120deg, #a9d8b8, #4f9a6b);
      border-color: #3c7f57;
      color: #133222;
    }

    .hint {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .step-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .history {
      border-top: 1px solid var(--line);
      padding: 12px 14px 14px;
      background: rgba(239, 248, 241, 0.76);
    }

    .history h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .history-list {
      margin: 0;
      padding-left: 0;
      max-height: 180px;
      overflow: auto;
      color: var(--muted);
      display: grid;
      gap: 4px;
      list-style: none;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: inherit;
      padding: 10px 12px;
      border-radius: 0;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      font-weight: 600;
    }

    .history-item.selected {
      border-color: var(--accent);
      background: #eaf6ee;
      color: var(--text);
      box-shadow: 0 0 0 2px rgba(63, 143, 95, 0.14) inset;
    }

    @media (max-width: 860px) {
      :root {
        --ground-image: url("andriod_background.png");
        --ground-overlay: rgba(14, 40, 25, 0.5);
      }

      body {
        background-attachment: scroll, scroll;
      }

      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .namebar { grid-template-columns: 1fr; }
      .stepbar { grid-template-columns: 1fr; }
      .board { grid-template-columns: 1fr; }
      .hint { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <h1 class="title">曹家麻将记账板</h1>
      <div class="stepbar">
        <div class="stepbox">
          <label for="stepValue">步长</label>
          <input id="stepValue" type="number" min="0.01" step="0.01" value="1">
        </div>
        <button class="main-btn primary" id="saveStepBtn">确定步长</button>
      </div>
      <div class="namebar">
        <div class="namebox">
          <label for="name1">1号名字</label>
          <input id="name1" type="text" placeholder="输入1号名字">
        </div>
        <div class="namebox">
          <label for="name2">2号名字</label>
          <input id="name2" type="text" placeholder="输入2号名字">
        </div>
        <div class="namebox">
          <label for="name3">3号名字</label>
          <input id="name3" type="text" placeholder="输入3号名字">
        </div>
        <button class="main-btn primary" id="saveNamesBtn">确定名字</button>
      </div>
      <div class="summary">
        <div class="stat"><small id="meLabel">我</small><div class="value" id="meValue">0</div></div>
        <div class="stat"><small id="p1Label">1号</small><div class="value" id="p1Value">0</div></div>
        <div class="stat"><small id="p2Label">2号</small><div class="value" id="p2Value">0</div></div>
        <div class="stat"><small id="p3Label">3号</small><div class="value" id="p3Value">0</div></div>
      </div>
    </section>

    <section class="board" id="board"></section>

    <section class="actions">
      <button class="main-btn" id="undoBtn">撤销一步</button>
      <button class="main-btn" id="undoSelectedBtn">撤销所选</button>
      <button class="main-btn primary" id="resetBtn">新一局清零</button>
      <div class="hint">红色: 我输该玩家 | 绿色: 我赢该玩家</div>
      <div class="step-hint" id="stepHint">当前步长：1</div>
    </section>

    <section class="history">
      <h3>最近记录</h3>
      <ol class="history-list" id="history"></ol>
    </section>
  </main>

  <script>
    const players = ["我", "1号", "2号", "3号"];
    const others = [1, 2, 3];
    const balances = [0, 0, 0, 0];
    const history = [];
    let selectedHistoryIndex = null;
    const playerNames = ["我", "1号", "2号", "3号"];
    let stepValue = 1;

    const board = document.getElementById("board");
    const historyEl = document.getElementById("history");
    const nameInputs = [document.getElementById("name1"), document.getElementById("name2"), document.getElementById("name3")];
    const labelEls = [null, document.getElementById("p1Label"), document.getElementById("p2Label"), document.getElementById("p3Label")];
    const stepInput = document.getElementById("stepValue");
    const stepHint = document.getElementById("stepHint");

    const multipliers = [1, 2, 3, 5, 10];

    function normalizeMoney(value) {
      return Math.round(value * 100) / 100;
    }

    function formatMoney(value) {
      const rounded = normalizeMoney(value);
      const text = rounded.toFixed(2).replace(/\.00$/, "").replace(/(\.\d)0$/, "$1");
      return rounded > 0 ? `+${text}` : text;
    }

    function formatPositiveMoney(value) {
      return formatMoney(value).replace(/^\+/, "");
    }

    function getAmounts() {
      return multipliers.map((multiplier) => normalizeMoney(multiplier * stepValue));
    }

    function loadNames() {
      try {
        const saved = JSON.parse(localStorage.getItem("mahjong-player-names") || "null");
        if (saved && Array.isArray(saved) && saved.length === 3) {
          for (let i = 0; i < 3; i += 1) {
            if (typeof saved[i] === "string" && saved[i].trim()) {
              playerNames[i + 1] = saved[i].trim();
              nameInputs[i].value = playerNames[i + 1];
            }
          }
        }
      } catch {
        // 忽略本地存储异常
      }
    }

    function saveNames() {
      const nextNames = nameInputs.map((input, index) => {
        const value = input.value.trim();
        return value || `${index + 1}号`;
      });

      for (let i = 0; i < nextNames.length; i += 1) {
        playerNames[i + 1] = nextNames[i];
      }

      try {
        localStorage.setItem("mahjong-player-names", JSON.stringify(nextNames));
      } catch {
        // 忽略本地存储异常
      }

      render();
    }

    function loadStep() {
      try {
        const saved = Number(localStorage.getItem("mahjong-step-value"));
        if (Number.isFinite(saved) && saved > 0) {
          stepValue = normalizeMoney(saved);
          stepInput.value = String(stepValue);
        }
      } catch {
        // 忽略本地存储异常
      }
    }

    function saveStep() {
      const nextValue = Number(stepInput.value);
      if (!Number.isFinite(nextValue) || nextValue <= 0) {
        stepInput.value = String(stepValue);
        return;
      }

      stepValue = normalizeMoney(nextValue);
      stepInput.value = String(stepValue);

      try {
        localStorage.setItem("mahjong-step-value", String(stepValue));
      } catch {
        // 忽略本地存储异常
      }

      render();
    }

    function applyDelta(opponent, amount, iWin) {
      const delta = Number(amount);
      if (iWin) {
        balances[0] = normalizeMoney(balances[0] + delta);
        balances[opponent] = normalizeMoney(balances[opponent] - delta);
      } else {
        balances[0] = normalizeMoney(balances[0] - delta);
        balances[opponent] = normalizeMoney(balances[opponent] + delta);
      }

      history.push({ opponent, amount: delta, iWin });
      render();
    }

    function undo() {
      const last = history.pop();
      if (!last) return;

      if (last.iWin) {
        balances[0] = normalizeMoney(balances[0] - last.amount);
        balances[last.opponent] = normalizeMoney(balances[last.opponent] + last.amount);
      } else {
        balances[0] = normalizeMoney(balances[0] + last.amount);
        balances[last.opponent] = normalizeMoney(balances[last.opponent] - last.amount);
      }

      render();
    }

    function undoSelected() {
      if (selectedHistoryIndex === null || !history[selectedHistoryIndex]) return;

      const item = history[selectedHistoryIndex];
      if (item.iWin) {
        balances[0] = normalizeMoney(balances[0] - item.amount);
        balances[item.opponent] = normalizeMoney(balances[item.opponent] + item.amount);
      } else {
        balances[0] = normalizeMoney(balances[0] + item.amount);
        balances[item.opponent] = normalizeMoney(balances[item.opponent] - item.amount);
      }

      history.splice(selectedHistoryIndex, 1);
      selectedHistoryIndex = null;
      render();
    }

    function resetAll() {
      for (let i = 0; i < balances.length; i += 1) balances[i] = 0;
      history.length = 0;
      selectedHistoryIndex = null;
      render();
    }

    function renderSummary() {
      document.getElementById("meValue").textContent = formatMoney(balances[0]);
      document.getElementById("p1Value").textContent = formatMoney(balances[1]);
      document.getElementById("p2Value").textContent = formatMoney(balances[2]);
      document.getElementById("p3Value").textContent = formatMoney(balances[3]);
      labelEls[1].textContent = playerNames[1];
      labelEls[2].textContent = playerNames[2];
      labelEls[3].textContent = playerNames[3];
      stepHint.textContent = `当前步长：${formatPositiveMoney(stepValue)}`;
    }

    function renderHistory() {
      historyEl.innerHTML = "";
      const startIndex = Math.max(0, history.length - 20);
      for (let index = history.length - 1; index >= startIndex; index -= 1) {
        const item = history[index];
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "history-item";
        if (index === selectedHistoryIndex) btn.classList.add("selected");
        if (item.iWin) {
          btn.textContent = `我赢${playerNames[item.opponent]} ${formatPositiveMoney(item.amount)} 块`;
        } else {
          btn.textContent = `我给${playerNames[item.opponent]} ${formatPositiveMoney(item.amount)} 块`;
        }
        btn.addEventListener("click", () => {
          selectedHistoryIndex = selectedHistoryIndex === index ? null : index;
          renderHistory();
        });
        li.appendChild(btn);
        historyEl.appendChild(li);
      }
      if (startIndex === history.length) {
        const li = document.createElement("li");
        li.textContent = "暂无记录";
        historyEl.appendChild(li);
      }
    }

    function renderBoard() {
      board.innerHTML = "";
      for (const p of others) {
        const panel = document.createElement("article");
        panel.className = "panel";

        const title = document.createElement("h2");
        title.textContent = `与${playerNames[p]}结算`;

        const lossRow = document.createElement("div");
        lossRow.className = "row";
        const amounts = getAmounts();
        for (const amt of amounts) {
          const btn = document.createElement("button");
          btn.className = "loss";
          btn.textContent = `-${formatPositiveMoney(amt)}`;
          btn.addEventListener("click", () => applyDelta(p, amt, false));
          lossRow.appendChild(btn);
        }

        const gainRow = document.createElement("div");
        gainRow.className = "row";
        for (const amt of amounts) {
          const btn = document.createElement("button");
          btn.className = "gain";
          btn.textContent = formatMoney(amt);
          btn.addEventListener("click", () => applyDelta(p, amt, true));
          gainRow.appendChild(btn);
        }

        const foot = document.createElement("div");
        foot.className = "panel-foot";
        foot.textContent = `当前对${playerNames[p]}盈亏: ${formatMoney(-balances[p])}`;

        panel.append(title, lossRow, gainRow, foot);
        board.appendChild(panel);
      }
    }

    function render() {
      renderSummary();
      renderBoard();
      renderHistory();
    }

    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("undoSelectedBtn").addEventListener("click", undoSelected);
    document.getElementById("resetBtn").addEventListener("click", resetAll);
    document.getElementById("saveNamesBtn").addEventListener("click", saveNames);
    document.getElementById("saveStepBtn").addEventListener("click", saveStep);

    loadStep();
    loadNames();

    render();
  </script>
</body>
</html>
